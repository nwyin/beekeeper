# Example project registry for beekeeper.
# Copy to ~/.beekeeper/projects.toml and customize.
#
# Each project needs at minimum a path. All other fields have defaults.
# Types: tool, app, research, content
# Attention: focus, maintain, explore, habit, shelved
# Stacks: rust, python, typescript, markdown

[projects.my-cli-tool]
path = "/home/user/projects/my-cli-tool"
github = "username/my-cli-tool"
type = "tool"
attention = "focus"
stack = "rust"
promote_channels = ["hn", "reddit", "blog"]

[projects.my-webapp]
path = "/home/user/projects/my-webapp"
github = "username/my-webapp"
type = "app"
attention = "maintain"
stack = "typescript"
promote_channels = []

[projects.my-research]
path = "/home/user/projects/my-research"
type = "research"
attention = "explore"
stack = "python"
promote_channels = ["blog"]
